<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thermodynamics: System States</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600&display=swap');

        body {
            margin: 0;
            padding: 0;
            background-color: #141C2D;
            color: #F0F5FA;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        #ui-container {
            margin-top: 20px;
            display: flex;
            gap: 20px;
            background: rgba(0, 0, 0, 0.3);
            padding: 15px 30px;
            border-radius: 12px;
            border: 1px solid rgba(0, 210, 255, 0.2);
            z-index: 10;
        }

        .btn {
            background: transparent;
            color: #00D2FF;
            border: 2px solid #00D2FF;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn.active {
            background: #00D2FF;
            color: #141C2D;
        }

        .slider-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-left: 20px;
            border-left: 1px solid rgba(255, 255, 255, 0.2);
            padding-left: 20px;
        }

        input[type=range] {
            accent-color: #FFBE00;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        #title {
            position: absolute;
            bottom: 30px;
            font-size: 24px;
            font-weight: 600;
            color: #00D2FF;
            z-index: 10;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
    </style>
</head>

<body>

    <div id="ui-container">
        <button class="btn active" onclick="setState('open')" id="btn-open">Open</button>
        <button class="btn" onclick="setState('closed')" id="btn-closed">Closed</button>
        <button class="btn" onclick="setState('isolated')" id="btn-isolated">Isolated</button>

        <div class="slider-container">
            <label for="temp">System Temperature</label>
            <input type="range" id="temp" min="1" max="10" value="3" oninput="updateTemp(this.value)">
        </div>
    </div>

    <div id="title">Open System</div>

    <canvas id="simCanvas"></canvas>

    <script>
        const canvas = document.getElementById('simCanvas');
        const ctx = canvas.getContext('2d');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let systemState = 'open'; // open, closed, isolated
        let temperature = 3;

        // Container properties
        const cw = 200;
        const ch = 250;
        const cx = canvas.width / 2;
        const cy = canvas.height / 2 + 50;

        class Particle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.radius = 4;
                this.baseSpeedX = (Math.random() - 0.5) * 2;
                this.baseSpeedY = (Math.random() - 0.5) * 2;
                this.escaped = false;
            }

            update() {
                // Apply temperature multiplier to speed
                let vx = this.baseSpeedX * temperature;
                let vy = this.baseSpeedY * temperature;

                this.x += vx;
                this.y += vy;

                // Wall collisions (Left, Right, Bottom)
                if (this.x - this.radius < cx - cw / 2) { this.x = cx - cw / 2 + this.radius; this.baseSpeedX *= -1; }
                if (this.x + this.radius > cx + cw / 2) { this.x = cx + cw / 2 - this.radius; this.baseSpeedX *= -1; }
                if (this.y + this.radius > cy + ch / 2) { this.y = cy + ch / 2 - this.radius; this.baseSpeedY *= -1; }

                // Top boundary collision logic
                if (this.y - this.radius < cy - ch / 2) {
                    if (systemState === 'open') {
                        // Let it escape if moving fast enough, otherwise weak bounce
                        if (vy < -2) {
                            this.escaped = true;
                        } else {
                            this.y = cy - ch / 2 + this.radius;
                            this.baseSpeedY *= -1;
                        }
                    } else {
                        // Closed or Isolated: strict bounce
                        this.y = cy - ch / 2 + this.radius;
                        this.baseSpeedY *= -1;
                    }
                }
            }

            draw() {
                if (this.escaped && this.y < -10) return; // Don't draw if far off screen
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = '#FFBE00'; // Gold particles
                ctx.fill();
            }
        }

        let particles = [];
        const maxParticles = 100;

        function initParticles() {
            particles = [];
            for (let i = 0; i < maxParticles; i++) {
                particles.push(new Particle(
                    cx + (Math.random() - 0.5) * (cw - 20),
                    cy + (Math.random() - 0.5) * (ch - 20)
                ));
            }
        }

        function maintainParticleCount() {
            // Replace escaped particles if in open system to keep the visual going
            let active = particles.filter(p => !p.escaped);
            if (active.length < maxParticles) {
                particles.push(new Particle(cx, cy + ch / 4));
            }
        }

        function drawContainer() {
            ctx.lineWidth = 4;

            // Draw Thermal Glow (Surroundings)
            if (systemState !== 'isolated') {
                let glowIntensity = temperature * 10;
                let grad = ctx.createRadialGradient(cx, cy, 50, cx, cy, 300);
                grad.addColorStop(0, `rgba(255, 100, 0, ${glowIntensity / 255})`);
                grad.addColorStop(1, 'rgba(20, 28, 45, 0)');
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }

            // Draw Walls
            if (systemState === 'isolated') {
                ctx.strokeStyle = '#888'; // Thick grey insulation
                ctx.lineWidth = 16;
            } else {
                ctx.strokeStyle = '#00D2FF'; // Glass
                ctx.lineWidth = 4;
            }

            ctx.beginPath();
            ctx.moveTo(cx - cw / 2, cy - ch / 2);
            ctx.lineTo(cx - cw / 2, cy + ch / 2);
            ctx.lineTo(cx + cw / 2, cy + ch / 2);
            ctx.lineTo(cx + cw / 2, cy - ch / 2);

            // Draw Lid
            if (systemState === 'closed' || systemState === 'isolated') {
                ctx.lineTo(cx - cw / 2, cy - ch / 2);
            }
            ctx.stroke();
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            drawContainer();

            if (systemState === 'open') maintainParticleCount();

            particles.forEach(p => {
                p.update();
                p.draw();
            });

            requestAnimationFrame(animate);
        }

        // UI Interactions
        window.setState = function (state) {
            systemState = state;
            document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-' + state).classList.add('active');

            let titleText = state.charAt(0).toUpperCase() + state.slice(1) + " System";
            if (state === 'open') titleText += " (Energy & Matter Exchange)";
            if (state === 'closed') titleText += " (Energy Exchange Only)";
            if (state === 'isolated') titleText += " (No Exchange)";
            document.getElementById('title').innerText = titleText;

            if (state !== 'open') {
                // Instantly return escaped particles into the box
                particles.forEach(p => {
                    if (p.escaped || p.y < cy - ch / 2) {
                        p.escaped = false;
                        p.x = cx;
                        p.y = cy;
                    }
                });
            }
        }

        window.updateTemp = function (val) {
            temperature = val;
        }

        // Handle resize
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        initParticles();
        animate();
    </script>
</body>

</html>
